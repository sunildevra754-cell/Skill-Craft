<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏱️ Stopwatch</h1>
        
        <!-- Display jo timer dikhata hai -->
        <div class="display" id="display">00:00:00.00</div>
        
        <!-- Buttons Section -->
        <div class="buttons">
            <button class="start-btn" id="startBtn">Start</button>
            <button class="pause-btn" id="pauseBtn" disabled>Pause</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
            <button class="lap-btn" id="lapBtn" disabled>Lap</button>
        </div>
        <!-- Laps History -->
        <div class="laps">
            <div id="lapsList" class="no-laps">No laps recorded yet</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
